name: CI Pipeline

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: ./mvnw clean package -DskipTests

      - name: Run tests
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/test
        run: ./mvnw test

      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=ВАШ_PROJECT_KEY -Dsonar.organization=ВАША_ОРГАНИЗАЦИЯ -Dsonar.host.url=https://sonarcloud.io