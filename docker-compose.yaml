services:
  devops-project:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - devops-project.db
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://user:pass@devops-project.db:27017/test?authSource=admin

  devops-project.db:
    container_name: database
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=pass
      - MONGO_INITDB_DATABASE=test
    ports:
      - "27017:27017"
    volumes:
      - mongodb:/data/db
      - mongoconfig:/data/configdb

volumes:
  mongodb:
  mongoconfig: