apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-project
  template:
    metadata:
      labels:
        app: devops-project
    spec:
      containers:
        - name: devops-project
          image: devops-project:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://user:pass@mongodb:27017/test?authSource=admin"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/v1/users
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/users
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: devops-project-svc
spec:
  type: NodePort
  selector:
    app: devops-project
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080